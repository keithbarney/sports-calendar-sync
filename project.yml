name: SportsCalendarSync
options:
  bundleIdPrefix: com.keithbarney
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: BXKNJTU253
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1"

schemes:
  SportsCalendarSync:
    build:
      targets:
        SportsCalendarSync: all
    run:
      commandLineArguments:
        "-seed-data": true
    archive:
      config: Release

targets:
  SportsCalendarSync:
    type: application
    platform: iOS
    sources:
      - SportsCalendarSync
    settings:
      base:
        INFOPLIST_FILE: SportsCalendarSync/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.keithbarney.sportssync
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: SportsCalendarSyncWidget
    entitlements:
      path: SportsCalendarSync/SportsCalendarSync.entitlements

  SportsCalendarSyncWidget:
    type: app-extension
    platform: iOS
    sources:
      - SportsCalendarSyncWidget
      - path: SportsCalendarSync/Models/TrackedGame.swift
      - path: SportsCalendarSync/Models/TrackedTeam.swift
      - path: SportsCalendarSync/Models/League.swift
    settings:
      base:
        INFOPLIST_FILE: SportsCalendarSyncWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.keithbarney.sportssync.widget
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: BXKNJTU253
    entitlements:
      path: SportsCalendarSyncWidget/SportsCalendarSyncWidget.entitlements
